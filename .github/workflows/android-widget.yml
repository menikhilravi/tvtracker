# Builds the Android widget companion app and publishes the APK as a workflow
# artifact — no local Android SDK needed. Download the artifact from the run's
# Summary page and sideload it on your phone (see android/README.md).
name: Android widget APK

on:
  push:
    branches: [main]
    paths: ['android/**', '.github/workflows/android-widget.yml']
  pull_request:
    paths: ['android/**', '.github/workflows/android-widget.yml']
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.14.3'

      - name: Build debug APK
        working-directory: android
        run: gradle assembleDebug

      - uses: actions/upload-artifact@v4
        with:
          name: tvtracker-widget-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error
